<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Panel Depósito · Volhotic</title>
<style>
:root{--green:#00a651;--yellow:#FFE600;--red:#e4002b;--blue:#0ea5e9;--dark:#1a1a1a}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0f0;color:var(--dark);min-height:100vh}

/* HEADER */
header{background:var(--dark);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:30;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.header-logo{display:flex;align-items:center;gap:10px}
.logo-badge{background:var(--yellow);color:var(--dark);font-size:10px;font-weight:900;padding:2px 6px;border-radius:4px;letter-spacing:.5px}
.header-status{display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;background:#555;flex-shrink:0}
.dot.ok{background:var(--green)}.dot.err{background:var(--red)}.dot.syn{background:var(--yellow);animation:pulse .8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.header-time{color:#aaa;font-size:11px}

/* STATS BANNER */
.stats-banner{background:linear-gradient(135deg,#1a1a1a 0%,#2d2d2d 100%);padding:14px 16px;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;border-bottom:3px solid var(--yellow)}
.stat-card{text-align:center;padding:8px 4px;border-radius:10px;background:rgba(255,255,255,.05)}
.stat-n{font-size:26px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums}
.stat-l{font-size:9px;color:#888;font-weight:700;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.n-enc{color:var(--green)}.n-noe{color:var(--red)}.n-pend{color:#9ca3af}.n-total{color:#fff}

/* UPDATE BAR */
.update-bar{background:#fff;padding:5px 14px;font-size:11px;color:#aaa;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;justify-content:space-between}

/* SEARCH */
.search-section{background:#fff;padding:12px 14px 8px;border-bottom:2px solid var(--yellow)}
.search-label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.search-row{display:flex;gap:8px;align-items:stretch}
.search-wrap{position:relative;flex:1}
.search-input{width:100%;border:2px solid #e0e0e0;border-radius:12px;padding:14px 16px;font-size:17px;font-family:monospace;font-weight:700;outline:none;transition:border-color .2s;background:#fafafa}
.search-input:focus{border-color:var(--green);background:#fff}
.search-input::placeholder{color:#ccc;font-size:14px;font-weight:400;font-family:inherit}
.sugerencias{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:2px solid var(--green);border-radius:12px;z-index:50;max-height:220px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.15);display:none}
.sug-item{padding:12px 16px;cursor:pointer;border-bottom:1px solid #f5f5f5;display:flex;align-items:center;gap:10px}
.sug-item:last-child{border-bottom:none}
.sug-item:active{background:#f0fdf4}
.sug-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sug-icon.disco{background:#f0fdf4}.sug-icon.pastilla{background:#fef3c7}.sug-icon.sensor{background:#f0f9ff}
.sug-info{flex:1;min-width:0}
.sug-sku{font-family:monospace;font-weight:900;font-size:14px;color:var(--green)}
.sug-desc{font-size:12px;color:#666;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sug-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0}
.btn-registrar{background:var(--dark);color:var(--yellow);border:none;border-radius:12px;padding:0 20px;font-size:14px;font-weight:900;cursor:pointer;white-space:nowrap;min-height:52px}
.btn-registrar:active{opacity:.8}

/* TABS */
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--yellow);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{flex:1;min-width:72px;padding:11px 4px 9px;font-size:10px;font-weight:800;color:#bbb;border:none;background:none;cursor:pointer;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s}
.tab-btn.on{color:var(--dark);border-bottom:3px solid var(--dark);margin-bottom:-2px}
.tab-icon{font-size:16px}
.section-count{font-size:11px;color:#aaa;padding:8px 14px 2px;background:#f0f0f0}

/* ITEMS */
.list{padding:8px 12px 100px;display:flex;flex-direction:column;gap:8px}
.item{background:#fff;border-radius:14px;padding:0;display:flex;align-items:stretch;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.07);border:1px solid #f0f0f0}
.item-accent{width:5px;flex-shrink:0}
.item-accent.f1{background:var(--green)}
.item-accent.f3{background:#9333ea}
.item-accent.f2{background:#f59e0b}
.item-accent.pub{background:var(--blue)}
.item-inner{flex:1;padding:12px 12px 12px 10px;display:flex;align-items:center;gap:10px;min-width:0}
.item-thumb{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.item-thumb.disco{background:#f0fdf4}
.item-thumb.pastilla{background:#fffbeb}
.item-thumb.sensor{background:#f0f9ff}
.item-thumb.pub-t{background:#e0f2fe}
.item-body{flex:1;min-width:0}
.item-sku{font-size:12px;font-weight:900;font-family:monospace;color:#555;letter-spacing:.3px}
.item-desc{font-size:14px;font-weight:700;color:var(--dark);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap}
.item-qty{font-size:11px;color:var(--green);font-weight:800;background:#f0fdf4;padding:2px 7px;border-radius:6px}
.item-ts{font-size:10px;color:#bbb}
.item-ag{font-size:10px;color:#065f46;font-weight:700;background:#d1fae5;padding:2px 7px;border-radius:6px}
.item-badge{font-size:11px;font-weight:800;padding:5px 10px;border-radius:10px;flex-shrink:0;white-space:nowrap;align-self:center}
.badge-f1{background:#d1fae5;color:#065f46}
.badge-f3{background:#ede9fe;color:#5b21b6}
.badge-f2{background:#fef3c7;color:#92400e}
.badge-pub{background:#e0f2fe;color:#0369a1}
.item-link{font-size:11px;color:#0369a1;text-decoration:none;margin-top:3px;display:inline-block}

.empty{text-align:center;padding:50px 20px;color:#ccc}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:15px;font-weight:600;color:#bbb}
.placeholder-box{background:#fff;border-radius:14px;padding:16px;margin:6px 0;border-left:4px solid #e0e0e0}
.placeholder-box.ag{border-left-color:var(--green)}
.placeholder-box strong{display:block;font-size:13px;margin-bottom:4px;color:var(--dark)}
.placeholder-box span{font-size:12px;color:#888}

/* FAB refresh */
.fab{position:fixed;bottom:24px;right:16px;background:var(--dark);color:var(--yellow);border:none;border-radius:50%;width:52px;height:52px;font-size:22px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.3);z-index:20;display:flex;align-items:center;justify-content:center}
.fab:active{transform:scale(.92)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:24px 24px 0 0;padding:20px 20px 44px;width:100%;max-width:480px;animation:slideUp .22s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 20px}
.modal-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.modal-thumb{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.modal-sku{font-family:monospace;font-size:13px;font-weight:700;color:#888;letter-spacing:.5px}
.modal-name{font-size:17px;font-weight:900;color:var(--dark);line-height:1.2;margin-top:2px}
.modal-fase{font-size:12px;font-weight:700;margin-top:4px;padding:3px 8px;border-radius:8px;display:inline-block}
.modal-fase.f1{background:#d1fae5;color:#065f46}
.modal-fase.f2{background:#fef3c7;color:#92400e}
.modal-fase.f3{background:#ede9fe;color:#5b21b6}
.modal-fase.fa{background:#d1fae5;color:#065f46}
.qty-section{margin-bottom:20px}
.qty-label{font-size:12px;font-weight:800;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.qty-row{display:flex;align-items:center;gap:14px}
.qty-btn{width:54px;height:54px;border-radius:50%;border:2px solid #e0e0e0;font-size:28px;font-weight:900;background:#f9f9f9;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.qty-btn:active{background:#e8e8e8;transform:scale(.95)}
.qty-input{flex:1;border:2px solid #e0e0e0;border-radius:14px;padding:14px;font-size:34px;font-weight:900;text-align:center;font-family:monospace;outline:none}
.qty-input:focus{border-color:var(--green)}
.btn-confirmar{width:100%;padding:17px;background:var(--green);color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:900;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-confirmar:active{opacity:.85}
.btn-cancelar{width:100%;padding:12px;background:none;color:#aaa;border:none;font-size:14px;cursor:pointer}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--dark);color:#fff;padding:11px 22px;border-radius:22px;font-size:13px;font-weight:700;z-index:200;opacity:0;transition:all .25s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* TEXTAR HERO */
.textar-hero{background:var(--yellow);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e8c900}
.textar-brand{display:flex;flex-direction:column}
.textar-wordmark{font-size:22px;font-weight:900;color:var(--dark);letter-spacing:2px;font-style:italic}
.textar-sub{font-size:8px;font-weight:700;color:var(--dark);letter-spacing:3px;opacity:.7}
.textar-icons{display:flex;gap:8px}
.product-chip{background:rgba(0,0,0,.1);border-radius:20px;padding:5px 10px;font-size:11px;font-weight:700;color:var(--dark);display:flex;align-items:center;gap:4px}
</style>
</head>

var datos={};var tab='f1';var skuActual=null;

function tipoSKU(s){if(s.startsWith('92'))return'disco';if(s.startsWith('2')||s==='4226001')return'pastilla';if(s.startsWith('98'))return'sensor';return'disco';}
var _DISC_SVG='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36"><circle cx="18" cy="18" r="16" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/><circle cx="18" cy="18" r="10" fill="none" stroke="#4caf50" stroke-width="2.5"/><circle cx="18" cy="18" r="4" fill="#4caf50"/><line x1="18" y1="2" x2="18" y2="8" stroke="#4caf50" stroke-width="2" stroke-linecap="round"/><line x1="18" y1="28" x2="18" y2="34" stroke="#4caf50" stroke-width="2" stroke-linecap="round"/><line x1="2" y1="18" x2="8" y2="18" stroke="#4caf50" stroke-width="2" stroke-linecap="round"/><line x1="28" y1="18" x2="34" y2="18" stroke="#4caf50" stroke-width="2" stroke-linecap="round"/></svg>';
var _PAD_SVG='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36"><rect x="6" y="8" width="24" height="18" rx="4" fill="#fff8e1" stroke="#f59e0b" stroke-width="2"/><rect x="10" y="12" width="16" height="10" rx="2" fill="#f59e0b"/><rect x="13" y="26" width="4" height="4" rx="1" fill="#f59e0b"/><rect x="19" y="26" width="4" height="4" rx="1" fill="#f59e0b"/></svg>';
var _SEN_SVG='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36"><line x1="18" y1="4" x2="18" y2="16" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/><circle cx="18" cy="20" r="5" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/><circle cx="18" cy="20" r="2" fill="#0ea5e9"/><path d="M10 28 Q18 22 26 28" stroke="#0ea5e9" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M7 32 Q18 24 29 32" stroke="#0ea5e9" stroke-width="1.5" fill="none" stroke-linecap="round" opacity=".5"/></svg>';
function iconoSKU(s){var t=tipoSKU(s);return t==='disco'?_DISC_SVG:t==='pastilla'?_PAD_SVG:_SEN_SVG;}
function thumbClass(s){var t=tipoSKU(s);return t==='disco'?'disco':t==='pastilla'?'pastilla':'sensor';}
function esFase2(s){return s.startsWith('2')||s.startsWith('98')||s==='4226001';}
function esFase3(s){return s.startsWith('92')&&!FASE1.has(s);}

function faseInfo(sku){
  if(FASE1.has(sku))return{cls:'f1',txt:'🟢 Fase 1 · AG disponible'};
  if(FASE2_AG.has(sku))return{cls:'fa',txt:'🟢 AG disponible'};
  if(esFase2(sku))return{cls:'f2',txt:'🟡 Pastilla/Sensor'};
  return{cls:'f3',txt:'🔵 Sin equivalente AG'};
}

function onSkuInput(){
  var v=document.getElementById('sku-input').value.toUpperCase();
  document.getElementById('sku-input').value=v;
  var sug=document.getElementById('sugerencias');
  if(v.length<2){sug.style.display='none';return;}
  var matches=Object.entries(INV).filter(function(e){return e[0].includes(v)||e[1].toUpperCase().includes(v);}).slice(0,5);
  if(!matches.length){sug.style.display='none';return;}
  sug.innerHTML=matches.map(function(e){
    var t=tipoSKU(e[0]);var fi=faseInfo(e[0]);
    return '<div class="sug-item" onclick="seleccionarSKU(\''+e[0]+'\')">'
      +'<div class="sug-icon '+t+'">'+iconoSKU(e[0])+'</div>'
      +'<div class="sug-info"><div class="sug-sku">'+e[0]+'</div><div class="sug-desc">'+e[1]+'</div></div>'
      +'<span class="sug-badge badge-'+(FASE1.has(e[0])||FASE2_AG.has(e[0])?'f1':'f2')+'">'+fi.txt.split(' ')[0]+'</span>'
      +'</div>';
  }).join('');
  sug.style.display='block';
}

function seleccionarSKU(sku){
  document.getElementById('sku-input').value=sku;
  document.getElementById('sugerencias').style.display='none';
  abrirModal();
}

function abrirModal(){
  var raw=document.getElementById('sku-input').value.trim().toUpperCase();
  if(!raw){showToast('Ingresá un SKU o EAN');return;}
  document.getElementById('sugerencias').style.display='none';
  skuActual=raw;
  var desc=INV[raw]||'SKU desconocido';
  var fi=faseInfo(raw);
  document.getElementById('modal-sku').textContent='SKU '+raw;
  document.getElementById('modal-name').textContent=desc;
  document.getElementById('modal-thumb').innerHTML=iconoSKU(raw);
  document.getElementById('modal-thumb').className='modal-thumb '+thumbClass(raw);
  var fEl=document.getElementById('modal-fase');fEl.textContent=fi.txt;fEl.className='modal-fase '+fi.cls;
  document.getElementById('qty-input').value=1;
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(function(){document.getElementById('qty-input').select();},300);
}

function cerrarModal(e){if(e.target===document.getElementById('modal-overlay'))cerrarModalBtn();}
function cerrarModalBtn(){
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('sku-input').value='';
  skuActual=null;
}
function cambiarQty(d){
  var inp=document.getElementById('qty-input');
  inp.value=Math.max(1,(parseInt(inp.value)||1)+d);
}
function confirmarEncontrado(){
  if(!skuActual)return;
  var qty=parseInt(document.getElementById('qty-input').value)||1;
  guardarFB(skuActual,{estado:'enc',ts:Date.now(),cantidad:qty});
  cerrarModalBtn();
  showToast('✅ '+skuActual+' · '+qty+' ud'+(qty!==1?'s':''));
  setTimeout(cargar,600);
}
function guardarFB(sku,payload){
  fetch(FB+'/'+sku+'.json',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
    .catch(function(){showToast('Error Firebase');});
}
function showToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}
function setDot(s){document.getElementById('dot').className='dot '+s;}
function fmt(ts){
  if(!ts)return'';
  return new Date(ts).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function setTab(t){
  tab=t;
  document.querySelectorAll('.tab-btn').forEach(function(el){el.classList.remove('on');});
  var idx=['f1','f2','f3','pub'].indexOf(t);
  document.querySelectorAll('.tab-btn')[idx].classList.add('on');
  render();
}
function mkItem(sku,d,accentCls,thumbCls,badgeCls,badgeTxt,extra){
  return '<div class="item">'
    +'<div class="item-accent '+accentCls+'"></div>'
    +'<div class="item-inner">'
    +'<div class="item-thumb '+thumbCls+'">'+iconoSKU(sku)+'</div>'
    +'<div class="item-body">'
    +'<div class="item-sku">SKU '+sku+'</div>'
    +'<div class="item-desc">'+(INV[sku]||sku)+'</div>'
    +'<div class="item-meta">'
    +(d.cantidad?'<span class="item-qty">📦 '+d.cantidad+' ud'+(d.cantidad!==1?'s':'')+'</span>':'')
    +(d.ts?'<span class="item-ts">'+fmt(d.ts)+'</span>':'')
    +(extra||'')
    +'</div>'
    +(d.ml_link?'<a class="item-link" href="'+d.ml_link+'" target="_blank">🔗 Ver publicación ML</a>':'')
    +'</div>'
    +'<span class="item-badge '+badgeCls+'">'+badgeTxt+'</span>'
    +'</div></div>';
}
/*
 * LÓGICA DE FASES — REGLA IMPORTANTE
 * =====================================
 * FASE 1 : Discos (92xxxxx) CON match en Alta Gama → set FASE1 (64 SKUs)
 * FASE 2 : Pastillas/Sensores (2xxxxxx / 98xxxxx) CON match en Alta Gama → set FASE2_AG
 * FASE 3 : TODO lo que NO tiene match AG:
 *           - Discos 92xxxxx que no están en FASE1
 *           - Pastillas/Sensores que no están en FASE2_AG
 *
 * ⚠️  REGLA AUTODOC — VERIFICACIÓN OBLIGATORIA POST-SCRAPING:
 *     Cuando se corra el scraping de autodoc.es para obtener códigos OEM:
 *     1. Re-cruzar TODOS los SKUs contra la tienda Alta Gama actualizada
 *     2. Los que pasen a tener match AG se mueven de Fase 3 → Fase 1 o Fase 2
 *     3. Actualizar sets FASE1 y FASE2_AG con los nuevos matches
 *     4. Esta verificación es OBLIGATORIA — no omitir
 *     Los SKUs de Fase 3 son candidatos a ganar match tras autodoc.
 * =====================================
 */
function tieneMatchAG(sku){return FASE1.has(sku)||FASE2_AG.has(sku);}
function esDisco(sku){return sku.startsWith('92');}
function esPastillaSensor(sku){return sku.startsWith('2')||sku.startsWith('98')||sku==='4226001';}

function render(){
  var all=Object.entries(datos);
  var enc=all.filter(function(e){return e[1].estado==='enc';});
  var noe=all.filter(function(e){return e[1].estado==='noe';});
  var pub=all.filter(function(e){return e[1].publicado===true;});
  document.getElementById('s-enc').textContent=enc.length;
  document.getElementById('s-noe').textContent=noe.length;
  document.getElementById('s-pend').textContent=Math.max(0,TOTAL-enc.length-noe.length);
  var list=document.getElementById('list');
  var count=document.getElementById('section-count');

  // FASE 1: Discos encontrados CON match Alta Gama
  if(tab==='f1'){
    var items=enc.filter(function(e){return FASE1.has(e[0]);});
    count.textContent=items.length+' disco'+(items.length!==1?'s':'')+' con match AG · "Vender uno igual"';
    if(!items.length){list.innerHTML='<div class="empty"><div class="empty-icon">💿</div><div class="empty-text">Cristian aún no encontró<br>discos con match AG</div></div>';return;}
    list.innerHTML=items.sort(function(a,b){return(b[1].ts||0)-(a[1].ts||0);}).map(function(e){
      return mkItem(e[0],e[1],'f1','disco','badge-f1',e[1].publicado?'✅ Pub.':'Listo','<span class="item-ag">AG ✓</span>');
    }).join('');

  // FASE 2: Pastillas/Sensores encontrados CON match Alta Gama
  } else if(tab==='f2'){
    var items=enc.filter(function(e){return FASE2_AG.has(e[0]);});
    count.textContent=items.length+' pastilla/sensor con match AG · "Vender uno igual"';
    if(!items.length){list.innerHTML='<div class="empty"><div class="empty-icon">🔲</div><div class="empty-text">No hay pastillas/sensores<br>con match AG aún</div></div>';return;}
    list.innerHTML=items.sort(function(a,b){return(b[1].ts||0)-(a[1].ts||0);}).map(function(e){
      return mkItem(e[0],e[1],'f1','pastilla','badge-f1',e[1].publicado?'✅ Pub.':'Listo','<span class="item-ag">AG ✓</span>');
    }).join('');

  // FASE 3: TODO sin match AG (discos + pastillas/sensores). Tras autodoc pueden migrar a F1/F2.
  } else if(tab==='f3'){
    var items=enc.filter(function(e){return !tieneMatchAG(e[0]);});
    var discosSin=items.filter(function(e){return esDisco(e[0]);});
    var pastSin=items.filter(function(e){return esPastillaSensor(e[0]);});
    count.textContent=items.length+' sin match AG · pendiente autodoc.es (pueden migrar a F1/F2)';
    var html='';
    if(discosSin.length){
      html+='<div class="placeholder-box"><strong>💿 Discos sin equivalente AG</strong><span>⚠️ Tras scraping autodoc verificar si ganan match → mover a Fase 1</span></div>';
      html+=discosSin.sort(function(a,b){return(b[1].ts||0)-(a[1].ts||0);}).map(function(e){
        return mkItem(e[0],e[1],'f3','disco','badge-f3','Sin match','');
      }).join('');
    }
    if(pastSin.length){
      html+='<div class="placeholder-box"><strong>🔲 Pastillas/Sensores sin match AG</strong><span>⚠️ Tras scraping autodoc verificar si ganan match → mover a Fase 2</span></div>';
      html+=pastSin.sort(function(a,b){return(b[1].ts||0)-(a[1].ts||0);}).map(function(e){
        return mkItem(e[0],e[1],'f3','pastilla','badge-f3','Sin match','');
      }).join('');
    }
    if(!items.length)html='<div class="empty"><div class="empty-icon">🟢</div><div class="empty-text">¡Todo tiene match AG!<br>No hay items sin cruzar</div></div>';
    list.innerHTML=html;

  } else if(tab==='pub'){
    count.textContent=pub.length+' publicacion'+(pub.length!==1?'es':'')+' en Mercado Libre';
    if(!pub.length){list.innerHTML='<div class="empty"><div class="empty-icon">⭐</div><div class="empty-text">Las publicaciones de ML<br>aparecen acá</div></div>';return;}
    list.innerHTML=pub.sort(function(a,b){return(b[1].publicado_ts||0)-(a[1].publicado_ts||0);}).map(function(e){
      return mkItem(e[0],e[1],'pub','pub-t','badge-pub','En ML','');
    }).join('');
  }
}
function cargar(){
  setDot('syn');
  fetch(FB+'.json').then(function(r){if(!r.ok)throw new Error();return r.json();})
  .then(function(d){
    datos=d||{};setDot('ok');
    var now=new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    document.getElementById('last-update').textContent='Act. '+now+' · auto cada 30s';
    document.getElementById('header-ts').textContent=now;
    render();
  }).catch(function(){setDot('err');document.getElementById('last-update').textContent='Error Firebase';});
}
cargar();setInterval(cargar,30000);
</script>
</body>
</html>
