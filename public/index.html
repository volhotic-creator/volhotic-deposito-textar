<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Panel Depósito · Volhotic</title>
<style>
  :root { color-scheme: light; --green:#00a651; --yellow:#FFE600; --red:#e4002b; --blue:#0ea5e9; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f4f4; color: #1a1a1a; }

  header {
    background: #1a1a1a; color: var(--yellow); padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    font-weight: 800; font-size: 15px; letter-spacing: .3px;
  }
  header span { color: #aaa; font-size: 12px; font-weight: 400; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #555; display: inline-block; margin-right: 6px; }
  .dot.ok  { background: var(--green); }
  .dot.err { background: var(--red); }
  .dot.syn { background: var(--yellow); animation: pulse .8s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }

  .stats {
    display: flex; gap: 8px; padding: 12px 14px;
    border-bottom: 1px solid #e0e0e0; background: #fff; flex-wrap: wrap;
  }
  .stat { flex: 1; min-width: 70px; text-align: center; padding: 8px 6px; border-radius: 8px; background: #f9f9f9; border: 1px solid #e5e5e5; }
  .stat .n { font-size: 24px; font-weight: 900; line-height: 1; }
  .stat .l { font-size: 10px; color: #888; font-weight: 600; margin-top: 3px; text-transform: uppercase; letter-spacing: .4px; }
  .n-enc   { color: var(--green); }
  .n-noe   { color: var(--red); }
  .n-pend  { color: #9ca3af; }
  .n-total { color: #1a1a1a; }

  .last-update { padding: 5px 16px; font-size: 11px; color: #aaa; background: #fff; border-bottom: 2px solid var(--yellow); }

  /* Barra de búsqueda / registro */
  .registro-bar {
    background: #fff; padding: 10px 12px; border-bottom: 1px solid #e0e0e0;
    display: flex; gap: 8px; align-items: center;
  }
  .registro-bar input {
    flex: 1; border: 2px solid #e0e0e0; border-radius: 10px;
    padding: 12px 14px; font-size: 16px; font-family: monospace; font-weight: 700;
    text-transform: uppercase; outline: none; transition: border-color .2s;
  }
  .registro-bar input:focus { border-color: var(--green); }
  .btn-buscar {
    background: #1a1a1a; color: var(--yellow); border: none;
    border-radius: 10px; padding: 12px 18px; font-size: 14px; font-weight: 800;
    cursor: pointer; white-space: nowrap;
  }
  .btn-buscar:active { opacity: .75; }

  .list { padding: 8px 12px 100px; display: flex; flex-direction: column; gap: 6px; }

  .item {
    background: #fff; border-radius: 10px; padding: 13px 13px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06); border-left: 4px solid #e0e0e0;
  }
  .item.f1  { border-left-color: var(--green); background: #f0fdf4; }
  .item.f3  { border-left-color: #9333ea; background: #faf5ff; }
  .item.f2  { border-left-color: #f59e0b; background: #fffbeb; }
  .item.pub { border-left-color: var(--blue); background: #f0f9ff; }
  .item.noe { border-left-color: var(--red); background: #fff8f8; }

  .item-icon { font-size: 18px; flex-shrink: 0; }
  .item-body { flex: 1; min-width: 0; }
  .item-sku  { font-size: 13px; font-weight: 800; font-family: monospace; }
  .item-desc { font-size: 12px; color: #555; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-ts   { font-size: 10px; color: #aaa; margin-top: 2px; }
  .item-qty  { font-size: 11px; color: var(--green); font-weight: 700; margin-top: 2px; }
  .item-badge {
    font-size: 11px; font-weight: 700; padding: 4px 9px;
    border-radius: 20px; flex-shrink: 0; white-space: nowrap;
  }
  .badge-f1  { background: #d1fae5; color: #065f46; }
  .badge-f3  { background: #ede9fe; color: #5b21b6; }
  .badge-f2  { background: #fef3c7; color: #92400e; }
  .badge-pub { background: #e0f2fe; color: #0369a1; }
  .badge-noe { background: #fee2e2; color: #991b1b; }

  .item-link { font-size: 11px; color: #0369a1; text-decoration: none; margin-top: 3px; display: block; }

  .empty { text-align: center; padding: 40px 20px; color: #bbb; font-size: 14px; }
  .placeholder-msg { text-align: center; padding: 20px; color: #aaa; font-size: 13px; background: #fff; border-radius: 10px; margin: 8px 0; }
  .placeholder-msg strong { display: block; color: #888; margin-bottom: 6px; font-size: 15px; }

  .refresh-btn {
    position: fixed; bottom: 20px; right: 20px;
    background: #1a1a1a; color: var(--yellow); border: none;
    border-radius: 50%; width: 50px; height: 50px;
    font-size: 20px; cursor: pointer; box-shadow: 0 3px 10px rgba(0,0,0,.25);
    z-index: 10;
  }
  .refresh-btn:active { transform: scale(.92); }

  .tabs {
    display: flex; background: #fff; border-bottom: 2px solid var(--yellow);
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .tab {
    flex: 1; min-width: 80px; padding: 10px 4px;
    font-size: 11px; font-weight: 700; color: #999;
    border: none; background: none; cursor: pointer;
    text-transform: uppercase; letter-spacing: .4px; white-space: nowrap;
  }
  .tab.on { color: #1a1a1a; border-bottom: 2px solid #1a1a1a; margin-bottom: -2px; }

  .section-count { font-size: 11px; color: #aaa; padding: 6px 14px 2px; }

  /* Modal cantidad */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55);
    z-index: 100; align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 20px 20px 0 0; padding: 24px 20px 40px;
    width: 100%; max-width: 480px; animation: slideUp .25s ease;
  }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-title { font-size: 18px; font-weight: 900; margin-bottom: 4px; }
  .modal-desc  { font-size: 13px; color: #666; margin-bottom: 20px; }
  .modal-sku   { font-family: monospace; font-size: 22px; font-weight: 900; color: var(--green); margin-bottom: 2px; }
  .qty-label   { font-size: 13px; font-weight: 700; color: #555; margin-bottom: 8px; }
  .qty-row     { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .qty-btn     {
    width: 52px; height: 52px; border-radius: 50%; border: 2px solid #e0e0e0;
    font-size: 26px; font-weight: 900; background: #f4f4f4; cursor: pointer; line-height: 1;
  }
  .qty-btn:active { background: #e0e0e0; }
  .qty-input {
    flex: 1; border: 2px solid #e0e0e0; border-radius: 12px;
    padding: 14px; font-size: 32px; font-weight: 900; text-align: center;
    font-family: monospace; outline: none;
  }
  .qty-input:focus { border-color: var(--green); }
  .btn-confirmar {
    width: 100%; padding: 18px; background: var(--green); color: #fff;
    border: none; border-radius: 14px; font-size: 17px; font-weight: 900;
    cursor: pointer; margin-bottom: 10px;
  }
  .btn-confirmar:active { opacity: .8; }
  .btn-noencontrado {
    width: 100%; padding: 14px; background: #fee2e2; color: var(--red);
    border: none; border-radius: 14px; font-size: 14px; font-weight: 700;
    cursor: pointer; margin-bottom: 10px;
  }
  .btn-cancelar {
    width: 100%; padding: 12px; background: none; color: #999;
    border: none; font-size: 14px; cursor: pointer;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 20px;
    font-size: 13px; font-weight: 700; z-index: 200; opacity: 0; transition: opacity .3s;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>
